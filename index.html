<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Serverless APK Loader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        #drop-zone { border: 2px dashed #3f51b5; border-radius: 20px; padding: 60px; cursor: pointer; transition: 0.3s; }
        #drop-zone:hover { background: #1a1a1a; border-color: #5c6bc0; }
        .file-list { margin-top: 20px; text-align: left; background: #1e1e1e; padding: 20px; border-radius: 10px; display: none; }
        h1 { color: #3f51b5; }
    </style>
</head>
<body>

    <h1>Local APK Loader</h1>
    <p>Drag an APK here to "load" its contents into browser memory.</p>

    <div id="drop-zone">
        <p>Drop APK file here or click to select</p>
        <input type="file" id="file-input" accept=".apk" style="display:none">
    </div>

    <div id="output" class="file-list">
        <h3>APK Contents (Extracted Locally):</h3>
        <ul id="file-tree"></ul>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const output = document.getElementById('output');
        const fileTree = document.getElementById('file-tree');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            
            fileTree.innerHTML = "<li>Loading and decompressing...</li>";
            output.style.display = "block";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const zip = new JSZip();
                const contents = await zip.loadAsync(e.target.result);
                
                fileTree.innerHTML = "";
                Object.keys(contents.files).slice(0, 15).forEach(filename => {
                    const li = document.createElement('li');
                    li.textContent = filename;
                    fileTree.appendChild(li);
                });
                
                const count = Object.keys(contents.files).length;
                if (count > 15) {
                    const li = document.createElement('li');
                    li.textContent = `... and ${count - 15} more files.`;
                    fileTree.appendChild(li);
                }
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
