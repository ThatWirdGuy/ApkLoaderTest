<div style='width:100%;height:100%;max-width:100%; background:#000; border-radius:20px; overflow:hidden;'>
    <div id='game'></div>
</div>
 
<script type='text/javascript'>
    // This tells the engine to use the Android system instead of N64
    EJS_player = '#game';
    EJS_core = 'android';  
    
    // We leave gameUrl blank so you can pick the APK from your computer
    EJS_gameUrl = ''; 
    
    // Using the same path that worked for your SM64 test
    EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
</script>

<script src='https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js'></script>

<div style="margin-top: 20px; text-align: center;">
    <input type="file" id="apk-selector" accept=".apk" style="display:none">
    <button onclick="document.getElementById('apk-selector').click()" 
            style="padding:10px 20px; background:#00ff88; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">
        📂 LOAD YOUR APK
    </button>
</div>

<script>
    // This connects your file button to the emulator
    document.getElementById('apk-selector').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            // This force-starts the engine with your uploaded APK
            EJS_gameUrl = url;
            if (typeof EJS_load === 'function') {
                EJS_load();
            } else {
                alert("Engine still loading... wait 3 seconds and try again.");
            }
        }
    };
</script>
