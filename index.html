<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" title="Web APK Runner">
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; text-align: center; }
        #screen { width: 360px; height: 640px; border: 5px solid #333; margin: 20px auto; background: #111; }
        .status { margin-top: 10px; font-size: 14px; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Web Android Environment</h2>
    <div id="screen">
        <canvas id="v86-canvas"></canvas>
    </div>
    
    <div class="status" id="log">Status: Waiting for APK selection...</div>

    <div class="controls">
        <button onclick="startEmulator('game.apk')">Launch game.apk</button>
    </div>

    <script src="https://copy.sh/v86/libv86.js"></script>
    <script>
        function startEmulator(apkName) {
            document.getElementById('log').innerText = "Status: Booting VM and Loading " + apkName + "...";
            
            // This initializes a virtual machine inside the browser
            var emulator = new V86Starter({
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                memory_size: 512 * 1024 * 1024, // 512MB RAM
                screen_container: document.getElementById("screen"),
                bios: { url: "./sys/bios.bin" },
                vga_bios: { url: "./sys/vgabios.bin" },
                cdrom: { url: "./Apks/" + apkName },
                autostart: true,
            });
        }
    </script>
</body>
</html>
