<script type="module">
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('apk-input');
    const status = document.getElementById('status-text');
    const canvas = document.getElementById('android-canvas');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        dropZone.style.display = 'none';
        canvas.style.display = 'block';
        status.innerText = "Detecting browser capabilities...";

        // Check if running via file:// (which causes errors)
        if (window.location.protocol === 'file:') {
            status.innerHTML = "<b>Security Warning:</b> Browsers block emulators when opened as a double-clicked file.<br>Please use a local server or upload to GitHub Pages.";
            status.style.color = "#ff9800";
        }

        try {
            status.innerText = "Attempting High-Performance Load...";
            
            // Try the main engine first
            const engine = await import('https://cdn.jsdelivr.net/npm/@myandroid/wasm-core@latest/dist/index.js');
            
            await engine.launch({
                canvas: canvas,
                apk: file,
                memory: 512,
                cpu: "auto", // Engine will try SIMD, then fallback
                gpu: "webgl2"
            });

            status.innerText = "Running: " + file.name;

        } catch (primaryErr) {
            console.warn("Primary engine failed, switching to Lite Mode...", primaryErr);
            status.innerText = "SIMD Blocked. Starting Lite Compatibility Mode...";

            try {
                // FALLBACK: Load the Lite engine (No SIMD required)
                const liteEngine = await import('https://cdn.jsdelivr.net/npm/@myandroid/wasm-lite@latest/dist/index.js');
                
                await liteEngine.launch({
                    canvas: canvas,
                    apk: file,
                    memory: 256, 
                    cpu: "interpreter", // No hardware acceleration needed
                    gpu: "software"     // Basic rendering
                });

                status.innerText = "Running (Lite Mode): " + file.name;

            } catch (liteErr) {
                console.error(liteErr);
                status.innerHTML = "<b>Execution Blocked:</b> Your browser's security settings (COOP/COEP) are preventing the emulator from starting.<br><small>Try Chrome with 'Experimental WebAssembly' enabled.</small>";
                status.style.color = "#f44336";
            }
        }
    };
</script>
