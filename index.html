<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web APK Launcher</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #00cf5d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .app-card { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; transition: transform 0.2s; border: 1px solid #333; cursor: pointer; }
        .app-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .app-icon { width: 80px; height: 80px; background: #333; border-radius: 18px; margin-bottom: 10px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; }
        .btn { display: block; margin-top: 10px; padding: 8px; background: var(--accent); color: black; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
        h1 { text-align: center; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>MY APP LIBRARY</h1>

    <div class="grid" id="container">
        </div>

    <script>
        // List your APKs here
        const apps = [
            { name: "Flappy Bird", file: "flappy.apk", emoji: "🐤" },
            { name: "My Game", file: "game-v1.apk", emoji: "🎮" }
        ];

        const container = document.getElementById('container');
        apps.forEach(app => {
            container.innerHTML += `
                <div class="app-card">
                    <div class="app-icon">${app.emoji}</div>
                    <div class="app-name">${app.name}</div>
                    <a href="./Apks/${app.file}" class="btn" download>INSTALL</a>
                </div>
            `;
        });
    </script>
</body>
</html>
