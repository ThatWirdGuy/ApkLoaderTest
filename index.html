<script type="module">
    const fileList = document.getElementById('file-list');
    const folderInput = document.getElementById('folder-input');
    const status = document.getElementById('status-bar');
    const loader = document.getElementById('loader');
    const canvas = document.getElementById('android-canvas');
    const placeholder = document.getElementById('placeholder');
    const uiControls = document.getElementById('ui-controls');

    let currentVM = null;

    // Detection: Checks if vercel.json headers are active
    const isIsolated = window.crossOriginIsolated;
    
    const updateStatus = () => {
        if (isIsolated) {
            status.innerHTML = "✅ <span style='color:var(--accent)'>Vercel Secure Headers Active (High Perf)</span>";
        } else {
            status.innerHTML = "⚠️ <span style='color:orange'>Running in Compatibility Mode (Headers Missing)</span>";
        }
    };
    updateStatus();

    folderInput.onchange = (e) => {
        fileList.innerHTML = "";
        Array.from(e.target.files).forEach(file => {
            const btn = document.createElement('button');
            btn.className = 'file-btn';
            btn.innerText = "🎮 " + file.name;
            btn.onclick = () => launchApp(file);
            fileList.appendChild(btn);
        });
        status.innerText = "Folder loaded. Select an app to boot.";
    };

    async function launchApp(file) {
        // Cleanup old VM session
        if (currentVM) {
            location.reload(); // The cleanest way to wipe WASM memory in a browser
            return;
        }

        placeholder.style.display = 'none';
        loader.style.display = 'block';
        status.innerText = "Allocating RAM for " + file.name + "...";

        try {
            // Using esm.sh for the most reliable school-bypass import
            const { Android } = await import('https://esm.sh/emulator-js@latest');
            
            const blobUrl = URL.createObjectURL(file);
            
            currentVM = new Android({
                element: canvas,
                file: blobUrl,
                // If headers are missing, we force 'interpreter' to prevent a crash
                cpu: isIsolated ? 'auto' : 'interpreter',
                gpu: 'software', 
                onLoad: () => {
                    loader.style.display = 'none';
                    canvas.style.display = 'block';
                    uiControls.style.display = 'flex';
                    status.innerText = "Currently Playing: " + file.name;
                }
            });
        } catch (err) {
            loader.style.display = 'none';
            status.innerHTML = "<span style='color:red'>Crash: Browser blocked execution.</span>";
            console.error(err);
        }
    }

    // Fullscreen Toggle
    window.toggleFullscreen = () => {
        if (!document.fullscreenElement) {
            document.getElementById('emulator-container').requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };
</script>
