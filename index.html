<script type="module">
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('apk-input');
    const status = document.getElementById('status-text');
    const canvas = document.getElementById('android-canvas');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        dropZone.style.display = 'none';
        canvas.style.display = 'block';
        status.innerText = "Starting Compatibility Mode...";

        try {
            // We use the 'lite' build which doesn't require SIMD hardware acceleration
            const engine = await import('https://cdn.jsdelivr.net/npm/@myandroid/wasm-lite@latest/dist/index.js');
            
            await engine.launch({
                canvas: canvas,
                apk: file,
                // Lowering memory helps if your browser is restricted
                memory: 256, 
                cpu: "interpreter", // Uses software-based logic instead of hardware SIMD
                gpu: "software"     // Safer but slower
            });

            status.innerText = "Running Lite Mode: " + file.name;

        } catch (err) {
            console.error(err);
            status.innerHTML = "<b>Final Error:</b> Browser hardware isolation active.<br>Please try opening this file through a local host like Live Server.";
        }
    };
</script>
